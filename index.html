<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBM — Agent Kontrol Merkezi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ========== RESET & VARIABLES ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --gold: #c8a44e;
  --gold-light: #d4b96a;
  --gold-subtle: rgba(200,164,78,0.08);
  --gold-border: rgba(200,164,78,0.2);
  --blue: #3b82f6;
  --blue-light: #60a5fa;
  --blue-subtle: rgba(59,130,246,0.08);
  --green: #10b981;
  --green-subtle: rgba(16,185,129,0.1);
  --yellow: #f59e0b;
  --yellow-subtle: rgba(245,158,11,0.1);
  --red: #ef4444;
  --red-subtle: rgba(239,68,68,0.1);
  --purple: #8b5cf6;
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
  --sidebar-w: 260px;
  --sidebar-collapsed: 68px;
  --header-h: 56px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="light"] {
  --bg-root: #f5f5f4;
  --bg-surface: #ffffff;
  --bg-elevated: #ffffff;
  --bg-sidebar: #fafaf9;
  --bg-hover: #f5f5f4;
  --bg-active: #f0eeeb;
  --bg-input: #ffffff;
  --border-default: #e7e5e4;
  --border-subtle: #f0eeec;
  --text-primary: #1c1917;
  --text-secondary: #57534e;
  --text-tertiary: #a8a29e;
  --text-inverse: #fafaf9;
  --scrollbar-thumb: #d6d3d1;
  --kbd-bg: #f5f5f4;
}

[data-theme="dark"] {
  --bg-root: #0c0c0e;
  --bg-surface: #18181b;
  --bg-elevated: #1e1e22;
  --bg-sidebar: #111113;
  --bg-hover: #1e1e22;
  --bg-active: #27272a;
  --bg-input: #18181b;
  --border-default: #27272a;
  --border-subtle: #1e1e22;
  --text-primary: #fafaf9;
  --text-secondary: #a1a1aa;
  --text-tertiary: #52525b;
  --text-inverse: #18181b;
  --scrollbar-thumb: #3f3f46;
  --kbd-bg: #27272a;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
  --gold-subtle: rgba(200,164,78,0.12);
  --blue-subtle: rgba(59,130,246,0.12);
  --green-subtle: rgba(16,185,129,0.15);
  --yellow-subtle: rgba(245,158,11,0.15);
  --red-subtle: rgba(239,68,68,0.15);
}

/* ========== BASE ========== */
html { font-size: 14px; }
body {
  font-family: var(--font-body);
  background: var(--bg-root);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ========== LAYOUT ========== */
.app { display: flex; height: 100vh; }

/* ========== SIDEBAR ========== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-default);
  display: flex;
  flex-direction: column;
  transition: width var(--transition), min-width var(--transition);
  z-index: 50;
  overflow: hidden;
}
.sidebar.collapsed { width: var(--sidebar-collapsed); min-width: var(--sidebar-collapsed); }

.sidebar-brand {
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  border-bottom: 1px solid var(--border-default);
  flex-shrink: 0;
  cursor: pointer;
}
.sidebar-brand .logo {
  width: 28px; height: 28px;
  background: var(--gold);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
  letter-spacing: -0.5px;
}
.sidebar-brand .brand-text {
  font-weight: 700; font-size: 15px; letter-spacing: -0.3px;
  white-space: nowrap; overflow: hidden;
  transition: opacity var(--transition);
}
.sidebar-brand .brand-text span { color: var(--gold); }
.sidebar.collapsed .brand-text { opacity: 0; width: 0; }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 8px;
}
.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
  padding: 16px 12px 6px;
  white-space: nowrap;
  overflow: hidden;
}
.sidebar.collapsed .nav-section-label { opacity: 0; height: 0; padding: 0; margin: 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition);
  white-space: nowrap;
  position: relative;
  user-select: none;
  margin-bottom: 1px;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--gold-subtle);
  color: var(--gold);
}
.nav-item.active .nav-icon { color: var(--gold); }
.nav-icon {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
}
.nav-label { overflow: hidden; transition: opacity var(--transition); }
.sidebar.collapsed .nav-label { opacity: 0; width: 0; }
.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}
.sidebar.collapsed .nav-badge { display: none; }

/* ========== SUB-BRAND LOGOS ========== */
.sidebar-brands {
  padding: 8px 12px;
  border-top: 1px solid var(--border-default);
  flex-shrink: 0;
}
.sidebar-brands-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
  padding: 4px 4px 8px;
}
.sidebar.collapsed .sidebar-brands-label { display: none; }
.brand-logos {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.brand-logo-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: -0.5px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all var(--transition);
  text-decoration: none;
  position: relative;
}
.brand-logo-btn:hover {
  transform: scale(1.1);
  border-color: rgba(255,255,255,0.3);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  text-decoration: none;
}
.brand-logo-btn .brand-tooltip {
  display: none;
  position: absolute;
  left: calc(100% + 8px);
  top: 50%;
  transform: translateY(-50%);
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  font-size: 11px;
  white-space: nowrap;
  color: var(--text-primary);
  font-weight: 500;
  box-shadow: var(--shadow-md);
  z-index: 100;
}
.brand-logo-btn:hover .brand-tooltip { display: block; }

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--border-default);
  flex-shrink: 0;
}
.sidebar-collapse-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border-default);
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 12px;
  transition: all var(--transition);
}
.sidebar-collapse-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }

/* ========== MAIN AREA ========== */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ========== HEADER ========== */
.header {
  height: var(--header-h);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-default);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
  z-index: 40;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.breadcrumb-sep { color: var(--text-tertiary); }
.breadcrumb-current { font-weight: 600; color: var(--text-primary); }
.breadcrumb-parent { color: var(--text-tertiary); }

.header-right { display: flex; align-items: center; gap: 8px; }
.header-btn {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  border-radius: var(--radius);
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  cursor: pointer;
  color: var(--text-secondary);
  transition: all var(--transition);
  font-size: 16px;
}
.header-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-default); }

.search-trigger {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  cursor: pointer;
  color: var(--text-tertiary);
  font-size: 13px;
  font-family: var(--font-body);
  transition: all var(--transition);
  min-width: 200px;
}
.search-trigger:hover { border-color: var(--gold-border); }
.search-trigger kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--kbd-bg);
  border: 1px solid var(--border-default);
  border-radius: 4px;
  padding: 1px 5px;
  margin-left: auto;
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.status-dot.green { background: var(--green); box-shadow: 0 0 6px rgba(16,185,129,0.4); }
.status-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(245,158,11,0.4); }
.status-dot.red { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
.status-dot.gray { background: var(--text-tertiary); }

/* ========== CONTENT ========== */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.page { display: none; animation: fadeIn 0.25s ease; }
.page.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.page-subtitle { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }

/* ========== CARDS ========== */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: all var(--transition);
}
.card:hover { border-color: var(--gold-border); }
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

/* Stat Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
}
.stat-card.gold::before { background: var(--gold); }
.stat-card.blue::before { background: var(--blue); }
.stat-card.green::before { background: var(--green); }
.stat-card.red::before { background: var(--red); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.purple::before { background: var(--purple); }

.stat-card:hover { border-color: var(--gold-border); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.stat-label { font-size: 12px; color: var(--text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
.stat-change { font-size: 11px; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.stat-change.up { color: var(--green); }
.stat-change.down { color: var(--red); }

/* ========== TABLES ========== */
.table-container {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.table-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-subtle);
  flex-wrap: wrap;
}
.table-toolbar select,
.table-toolbar input[type="text"] {
  font-family: var(--font-body);
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-default);
  background: var(--bg-input);
  color: var(--text-primary);
  outline: none;
  transition: border-color var(--transition);
}
.table-toolbar select:focus,
.table-toolbar input[type="text"]:focus { border-color: var(--gold); }
.table-toolbar input[type="text"] { min-width: 180px; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 10px 16px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-tertiary);
  background: var(--bg-root);
  border-bottom: 1px solid var(--border-default);
  position: sticky;
  top: 0;
  z-index: 1;
}
td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-hover); }
td .agent-name { font-weight: 600; color: var(--text-primary); }

/* Tags & Badges */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}
.tag.active { background: var(--green-subtle); color: var(--green); }
.tag.idle { background: var(--yellow-subtle); color: var(--yellow); }
.tag.error { background: var(--red-subtle); color: var(--red); }
.tag.disabled { background: var(--bg-hover); color: var(--text-tertiary); }
.tag.cbm { background: var(--gold-subtle); color: var(--gold); }
.tag.printxu { background: var(--blue-subtle); color: var(--blue); }
.tag.studyo { background: rgba(139,92,246,0.1); color: var(--purple); }
.tag.sxu { background: rgba(236,72,153,0.1); color: #ec4899; }
.tag.tbm { background: rgba(20,184,166,0.1); color: #14b8a6; }

/* ========== BUTTONS ========== */
.btn {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  color: var(--text-primary);
  cursor: pointer;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--bg-hover); }
.btn-primary {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
}
.btn-primary:hover { background: var(--gold-light); }
.btn-success { background: var(--green); color: #fff; border-color: var(--green); }
.btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; }

/* ========== FEED / TIMELINE ========== */
.feed { display: flex; flex-direction: column; gap: 1px; }
.feed-item {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  transition: background var(--transition);
  cursor: pointer;
  font-size: 13px;
}
.feed-item:hover { background: var(--bg-hover); }
.feed-item:last-child { border-bottom: none; }
.feed-avatar {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
  color: #fff;
}
.feed-body { flex: 1; min-width: 0; }
.feed-title { font-weight: 600; color: var(--text-primary); }
.feed-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.feed-text { color: var(--text-secondary); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ========== HEALTH BAR ========== */
.health-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.health-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  flex: 1;
  min-width: 160px;
}
.health-item .project-name { flex: 1; }
.health-item .agent-count { color: var(--text-tertiary); font-size: 12px; }

/* ========== GRID LAYOUTS ========== */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
@media (max-width: 1024px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* ========== ORG CHART ========== */
.org-tree { padding: 20px; }
.org-dept {
  margin-bottom: 20px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.org-dept-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-root);
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  user-select: none;
}
.org-dept-header:hover { background: var(--bg-hover); }
.org-agents {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
  padding: 12px 16px;
}
.org-agent-card {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border-subtle);
  font-size: 12px;
  transition: all var(--transition);
}
.org-agent-card:hover { border-color: var(--gold-border); background: var(--gold-subtle); }

/* ========== KANBAN ========== */
.kanban {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  padding-bottom: 16px;
}
.kanban-col {
  min-width: 280px;
  max-width: 320px;
  flex-shrink: 0;
  background: var(--bg-root);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
}
.kanban-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  font-weight: 600;
  font-size: 13px;
  border-bottom: 1px solid var(--border-subtle);
}
.kanban-col-count {
  background: var(--bg-hover);
  color: var(--text-tertiary);
  padding: 1px 6px;
  border-radius: 6px;
  font-size: 11px;
}
.kanban-items { padding: 8px; display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; max-height: 500px; }
.kanban-card {

<script>
// ========== CONFIG ==========
const SUPABASE_URL = 'https://ggvamhyaposgwoixxwca.supabase.co';

  printxu: { name: 'PrintXu', color: '#3b82f6', agents: 16, supabase: 'https://finkngmejydwqikinbdv.supabase.co', admin: null },
  studyo: { name: 'Studyo', color: '#8b5cf6', agents: 14, supabase: 'https://jlinpfqqssqclsyhptfz.supabase.co', admin: null },
  sxu: { name: 'StudioXu', color: '#ec4899', agents: 8, supabase: SUPABASE_URL, admin: 'https://studioxu-ai.web.app/admin' },

};

let sb;
try { sb = supabase.createClient(SUPABASE_URL, ANON_KEY); } catch(e) { console.warn('Supabase client init failed, using REST', e); }

// ========== REST FALLBACK ==========
async function restQuery(table, params = '') {
  try {
    const url = `${SUPABASE_URL}/rest/v1/${table}${params ? '?' + params : ''}`;
    const resp = await fetch(url, {
      headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
    });
    if (!resp.ok) throw new Error(resp.status);
    return await resp.json();
  } catch(e) { console.warn(`REST query failed for ${table}:`, e); return null; }
}

async function queryTable(table, opts = {}) {
  const { select = '*', order, limit, filters, eq } = opts;
  // Try supabase client first
  if (sb) {
    try {
      let q = sb.from(table).select(select);
      if (eq) Object.entries(eq).forEach(([k,v]) => q = q.eq(k,v));
      if (filters) filters.forEach(f => q = q[f.op](f.col, f.val));
      if (order) q = q.order(order.col, { ascending: order.asc ?? false });
      if (limit) q = q.limit(limit);
      const { data, error } = await q;
      if (!error && data) return data;
    } catch(e) { /* fall through to REST */ }
  }
  // REST fallback
  let params = [];
  if (select && select !== '*') params.push(`select=${select}`);
  if (eq) Object.entries(eq).forEach(([k,v]) => params.push(`${k}=eq.${v}`));
  if (order) params.push(`order=${order.col}.${order.asc ? 'asc' : 'desc'}`);
  if (limit) params.push(`limit=${limit}`);
  return await restQuery(table, params.join('&'));
}

// ========== STATE ==========
let state = {

// ========== NAVIGATION ==========

  { section: 'Sistem' },
  { id: 'plugins', icon: '⬢', label: 'Plugin Envanter' },
  { id: 'org', icon: '◫', label: 'Org Chart' },
  { id: 'engineering', icon: '⚙', label: 'Mühendislik' },

  { id: 'command', icon: '▷', label: 'Komut Merkezi' },
  { section: 'Admin Panelleri' },
  { id: 'sxu-admin', icon: '◆', label: 'StudioXu Admin', external: 'https://studioxu-ai.web.app/admin', color: '#7c3aed' }
];

function renderNav() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = NAV_ITEMS.map(item => {
    if (item.section) return `<div class="nav-section-label">${item.section}</div>`;
    if (item.external) {
      return `<div class="nav-item" onclick="window.open('${item.external}','_blank')" title="${item.label}">
        <span class="nav-icon" ${item.color ? `style="color:${item.color}"` : ''}>${item.icon}</span>
        <span class="nav-label">${item.label}</span>
        <span class="nav-label" style="margin-left:auto;font-size:10px;color:var(--text-tertiary)">↗</span>
      </div>`;
    }
    const active = state.currentPage === item.id ? 'active' : '';
    const badge = item.badge > 0 ? `<span class="nav-badge">${item.badge}</span>` : '';
    return `<div class="nav-item ${active}" data-page="${item.id}" onclick="navigateTo('${item.id}')">
      <span class="nav-icon">${item.icon}</span>
      <span class="nav-label">${item.label}</span>
      ${badge}
    </div>`;
  }).join('');
}

function navigateTo(page) {
  state.currentPage = page;
  renderNav();
  renderPage();
  const item = NAV_ITEMS.find(n => n.id === page);
  if (item) document.getElementById('breadcrumbCurrent').textContent = item.label;
  closeCmdPalette();
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  state.sidebarCollapsed = !state.sidebarCollapsed;

}

// ========== THEME ==========
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('cbm-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀' : '◑';
}
(function initTheme() {
  const saved = localStorage.getItem('cbm-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    if (saved === 'dark') document.getElementById('themeBtn').textContent = '☀';
  }
})();

// ========== TOAST ==========
function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const icons = { info: 'ℹ', success: '✓', error: '✕', warning: '⚠' };
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span>${icons[type] || ''}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

// ========== COMMAND PALETTE ==========
function openCmdPalette() {
  document.getElementById('cmdOverlay').classList.add('open');
  document.getElementById('cmdInput').value = '';
  document.getElementById('cmdInput').focus();
  filterCmdResults('');
}
function closeCmdPalette() { document.getElementById('cmdOverlay').classList.remove('open'); }
function filterCmdResults(q) {
  const items = NAV_ITEMS.filter(n => n.id);
  const filtered = q ? items.filter(n => n.label.toLowerCase().includes(q.toLowerCase())) : items;
  document.getElementById('cmdResults').innerHTML = filtered.map(n =>
    `<div class="cmd-result-item" onclick="navigateTo('${n.id}')">
      <span class="cmd-result-icon">${n.icon}</span>
      <span>${n.label}</span>
    </div>`
  ).join('');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openCmdPalette(); }
  if (e.key === 'Escape') { closeCmdPalette(); closeDetail(); }
  // Number shortcuts 1-9 for nav
  if (!e.metaKey && !e.ctrlKey && !e.altKey && !document.querySelector('.cmd-overlay.open')) {
    const num = parseInt(e.key);
    const pages = NAV_ITEMS.filter(n => n.id);
    if (num >= 1 && num <= pages.length) { navigateTo(pages[num-1].id); }
  }
});

// ========== HELPERS ==========
function timeAgo(date) {
  if (!date) return '-';
  const d = new Date(date);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return `${diff}sn once`;
  if (diff < 3600) return `${Math.floor(diff/60)}dk once`;
  if (diff < 86400) return `${Math.floor(diff/3600)}sa once`;
  return `${Math.floor(diff/86400)}g once`;
}

function projectTag(project) {
  const p = project?.toLowerCase() || 'cbm';
  const names = { cbm: 'CBM', printxu: 'PrintXu', studyo: 'Studyo', sxu: 'StudioXu', tbm: 'TalentBM',
    'cbm-holding': 'CBM', studioXu: 'StudioXu', talentbm: 'TalentBM' };
  const cls = p.includes('print') ? 'printxu' : p.includes('stud') && !p.includes('xu') ? 'studyo' :
    p.includes('sxu') || p.includes('studiox') ? 'sxu' : p.includes('tbm') || p.includes('talent') ? 'tbm' : 'cbm';
  return `<span class="tag ${cls}">${names[p] || p.toUpperCase()}</span>`;
}

function statusTag(status) {
  const s = (status || 'idle').toLowerCase();
  const labels = { active: 'Aktif', idle: 'Beklemede', error: 'Hata', disabled: 'Devre Disi', online: 'Aktif', offline: 'Cevrimdisi' };
  const cls = s === 'active' || s === 'online' ? 'active' : s === 'error' ? 'error' : s === 'disabled' || s === 'offline' ? 'disabled' : 'idle';
  return `<span class="tag ${cls}">${labels[s] || s}</span>`;
}

function miniChart(values, color = 'var(--gold)') {
  const max = Math.max(...values, 1);
  return `<div class="mini-chart">${values.map(v =>
    `<div class="mini-chart-bar" style="height:${Math.max((v/max)*100,4)}%;background:${color}"></div>`
  ).join('')}</div>`;
}

function avatarColor(str) {
  const colors = ['#c8a44e','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f59e0b','#ef4444','#6366f1'];
  let hash = 0;
  for (let i = 0; i < (str||'').length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

function getInitials(name) {
  return (name || '??').split(/[-_ ]/).map(w => w[0]).join('').toUpperCase().slice(0,2);
}

async function loadAllData() {
  const connDot = document.getElementById('connStatus');
  const connLabel = document.getElementById('connLabel');
  connDot.className = 'status-dot yellow';
  connLabel.textContent = 'Yukleniyor...';

  try {
    const [agents, messages, tasks, approvals, crossMsgs, reports, costs, plugins, orgChart, backlog, deployments, health, cronJobs] = await Promise.allSettled([
      queryTable('agent_registry', { limit: 200 }),
      queryTable('agent_messages', { order: { col: 'created_at', asc: false }, limit: 50 }),
      queryTable('agent_tasks', { order: { col: 'created_at', asc: false }, limit: 50 }),
      queryTable('agent_approvals', { order: { col: 'created_at', asc: false }, limit: 50 }),
      queryTable('cross_project_messages', { order: { col: 'created_at', asc: false }, limit: 50 }),
      queryTable('subsidiary_reports', { order: { col: 'created_at', asc: false }, limit: 30 }),
      queryTable('infrastructure_costs', { order: { col: 'created_at', asc: false }, limit: 30 }),
      queryTable('plugin_inventory', { limit: 50 }),
      queryTable('agent_org_chart', { limit: 100 }),
      queryTable('engineering_backlog', { limit: 50 }),
      queryTable('deployment_log', { order: { col: 'created_at', asc: false }, limit: 30 }),
      queryTable('system_health_snapshots', { order: { col: 'created_at', asc: false }, limit: 30 }),
      queryTable('cron', { limit: 100 })
    ]);

    state.agents = agents.value || getDemoAgents();
    state.messages = messages.value || getDemoMessages();
    state.tasks = tasks.value || [];
    state.approvals = approvals.value || getDemoApprovals();
    state.crossMessages = crossMsgs.value || getDemoCrossMessages();
    state.reports = reports.value || getDemoReports();
    state.costs = costs.value || getDemoCosts();
    state.plugins = plugins.value || getDemoPlugins();
    state.orgChart = orgChart.value || [];
    state.backlog = backlog.value || getDemoBacklog();
    state.deployments = deployments.value || getDemoDeployments();
    state.healthSnapshots = health.value || [];
    state.cronJobs = cronJobs.value || getDemoCronJobs();

    // Ensure arrays
    Object.keys(state).forEach(k => { if (Array.isArray(state[k]) === false && ['agents','messages','tasks','approvals','crossMessages','reports','costs','plugins','orgChart','backlog','deployments','healthSnapshots','cronJobs'].includes(k)) state[k] = []; });

    connDot.className = 'status-dot green';
    connLabel.textContent = 'Bagli';
    showToast('Veriler basariyla yuklendi', 'success');
  } catch(e) {
    console.error('Load error:', e);
    connDot.className = 'status-dot red';
    connLabel.textContent = 'Baglanti hatasi';
    // Load demo data
    loadDemoData();
    showToast('Baglanti hatasi - demo veri gosteriliyor', 'warning');
  }
  renderPage();
}

function filterAgentTable() {
  const search = document.getElementById('agentSearch').value.toLowerCase();
  const proj = document.getElementById('agentProjFilter').value;
  const status = document.getElementById('agentStatusFilter').value;
  const filtered = (state.agents || []).filter(a => {
    if (search && !(a.agent_id||'').toLowerCase().includes(search) && !(a.role||'').toLowerCase().includes(search)) return false;

      <h3 style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text-secondary)">Gecmis</h3>
      <div class="table-container">
        <table>
          <thead><tr><th>Tip</th><th>Aciklama</th><th>Talep Eden</th><th>Durum</th><th>Tarih</th></tr></thead>

              <td><span class="tag idle">${typeLabels[a.type] || a.type}</span></td>

              <td style="font-size:12px">${a.requested_by}</td>

              <td style="font-size:12px;color:var(--text-tertiary)">${timeAgo(a.created_at)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    ` : ''}
  `;
}

async function handleApproval(id, newStatus) {
  try {
    if (sb) {
      await sb.from('agent_approvals').update({ status: newStatus }).eq('id', id);
    }
    const idx = state.approvals.findIndex(a => a.id === id);
    if (idx >= 0) state.approvals[idx].status = newStatus;
    showToast(newStatus === 'approved' ? 'Onaylandi' : 'Reddedildi', newStatus === 'approved' ? 'success' : 'info');
    renderPage();
  } catch(e) {
    showToast('Islem basarisiz', 'error');
  }
}

  costs.forEach(c => {
    byProject[c.project] = (byProject[c.project]||0) + (c.amount||0);

  return `

      </div>

          ${Object.entries(byProject).map(([proj, amount]) => {

// 10. ORG CHART
function renderOrg() {
  const agents = state.agents || [];
  const depts = {};
  agents.forEach(a => {
    const dept = a.department || 'Diger';
    if (!depts[dept]) depts[dept] = [];
    depts[dept].push(a);
  });
  // Group by project then department
  const projects = {};
  agents.forEach(a => {
    const proj = a.project || 'cbm';
    if (!projects[proj]) projects[proj] = {};
    const dept = a.department || 'Diger';
    if (!projects[proj][dept]) projects[proj][dept] = [];
    projects[proj][dept].push(a);
  });

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Organizasyon Semasi</div>
        <div class="page-subtitle">Tum agentlar proje ve departman bazli</div>
      </div>
    </div>
    <div class="org-tree">
      ${Object.entries(projects).map(([proj, depts]) => {
        const p = PROJECTS[proj] || { name: proj, color: '#888' };
        return `
          <div class="org-dept">
            <div class="org-dept-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'" style="border-left:4px solid ${p.color}">
              <div style="display:flex;align-items:center;gap:8px">
                ${projectTag(proj)}
                <span>${p.name}</span>
              </div>
              <span style="color:var(--text-tertiary);font-size:12px">${Object.values(depts).flat().length} agent ▾</span>
            </div>
            <div>
              ${Object.entries(depts).map(([dept, agents]) => `
                <div style="padding:8px 16px;border-bottom:1px solid var(--border-subtle)">
                  <div style="font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:8px">${dept}</div>
                  <div class="org-agents">
                    ${agents.map(a => `

                        <span class="status-dot ${a.status === 'active' ? 'green' : a.status === 'error' ? 'red' : 'gray'}"></span>

}

// 13. COMMAND CENTER
function renderCommand() {
  const agents = state.agents || [];
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Komut Merkezi</div>
        <div class="page-subtitle">Agent'larla iletisim</div>
      </div>
    </div>
    <div class="chat-container">
      <div class="chat-sidebar-panel">
        <div class="chat-sidebar-header">Agent Sec</div>
        <div style="padding:8px">
          <input type="text" style="width:100%;font-family:var(--font-body);font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-input);color:var(--text-primary);outline:none" placeholder="Ara..." id="chatAgentSearch" oninput="filterChatAgents(this.value)">
        </div>
        <div class="chat-agent-list" id="chatAgentList">
          ${agents.slice(0,30).map((a,i) => `
            <div class="chat-agent-item ${i===0?'active':''}" data-agent="${a.agent_id}" onclick="selectChatAgent('${a.agent_id}',this)">
              <span class="status-dot ${a.status === 'active' ? 'green' : a.status === 'error' ? 'red' : 'gray'}"></span>
              <div style="min-width:0">
                <div style="font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.role || a.agent_id}</div>
                <div style="font-size:10px;color:var(--text-tertiary)">${a.project}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="chat-main-panel">
        <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border-subtle)">
          <span class="status-dot green"></span>
          <span style="font-weight:600;font-size:13px" id="chatCurrentAgent">${agents[0]?.role || agents[0]?.agent_id || 'Agent'}</span>
          <span style="font-size:11px;color:var(--text-tertiary)" id="chatCurrentAgentId">${agents[0]?.agent_id || '-'}</span>
          <div style="margin-left:auto;display:flex;gap:4px">
            <button class="btn btn-sm" title="Ses" style="font-size:14px">🎤</button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div style="text-align:center;color:var(--text-tertiary);font-size:12px;padding:20px">
            Komut gondermek icin asagidaki alani kullanin
          </div>
        </div>
        <div class="chat-input-bar">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="Komut yaz..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}"></textarea>
          <button class="btn btn-primary" onclick="sendChatMessage()">Gonder</button>
        </div>
        <div style="padding:6px 16px 12px;display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-sm" onclick="quickCmd('Durum raporu ver')">📊 Durum Raporu</button>
          <button class="btn btn-sm" onclick="quickCmd('Son gorevleri listele')">📋 Gorevler</button>
          <button class="btn btn-sm" onclick="quickCmd('Performans metrikleri')">📈 Metrikler</button>
          <button class="btn btn-sm" onclick="quickCmd('Hata log kontrol')">🔍 Log Kontrol</button>
        </div>
      </div>
    </div>
  `;
}

let chatSelectedAgent = null;
function initChat() {
  const agents = state.agents || [];
  chatSelectedAgent = agents[0]?.agent_id || null;
}

function selectChatAgent(agentId, el) {
  chatSelectedAgent = agentId;
  document.querySelectorAll('.chat-agent-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
  const agent = (state.agents || []).find(a => a.agent_id === agentId);
  document.getElementById('chatCurrentAgent').textContent = agent?.role || agentId;
  document.getElementById('chatCurrentAgentId').textContent = agentId;
  document.getElementById('chatMessages').innerHTML = `
    <div style="text-align:center;color:var(--text-tertiary);font-size:12px;padding:20px">
      ${agent?.role || agentId} ile konusma baslat
    </div>
  `;
}

function filterChatAgents(q) {
  const agents = (state.agents || []).filter(a =>
    !q || (a.agent_id||'').toLowerCase().includes(q.toLowerCase()) || (a.role||'').toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('chatAgentList').innerHTML = agents.slice(0,30).map(a => `
    <div class="chat-agent-item ${a.agent_id === chatSelectedAgent ? 'active' : ''}" data-agent="${a.agent_id}" onclick="selectChatAgent('${a.agent_id}',this)">
      <span class="status-dot ${a.status === 'active' ? 'green' : a.status === 'error' ? 'red' : 'gray'}"></span>
      <div style="min-width:0">
        <div style="font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.role || a.agent_id}</div>
        <div style="font-size:10px;color:var(--text-tertiary)">${a.project}</div>
      </div>
    </div>
  `).join('');
}

function quickCmd(text) {
  document.getElementById('chatInput').value = text;
  sendChatMessage();
}

async function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !chatSelectedAgent) return;
  input.value = '';

  const container = document.getElementById('chatMessages');
  // Remove placeholder
  const placeholder = container.querySelector('div[style*="text-align:center"]');
  if (placeholder) placeholder.remove();

  // Add sent message
  container.innerHTML += `<div class="chat-message sent">${msg}</div>`;
  container.scrollTop = container.scrollHeight;

  // Try to send via Supabase
  try {
    if (sb) {
      await sb.from('agent_messages').insert({
        agent_id: chatSelectedAgent,
        type: 'command',
        priority: 'high',
        subject: 'Dashboard Komutu',
        body: { message: msg, source: 'dashboard' }
      });
    }
  } catch(e) { console.warn('Send failed:', e); }

  // Simulate response
  setTimeout(() => {
    container.innerHTML += `<div class="chat-message received">
      <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:4px">${chatSelectedAgent}</div>
      Komut alindi. Isleniyor...
    </div>`;
    container.scrollTop = container.scrollHeight;
  }, 800);
}

// ========== INIT ==========
renderNav();
loadAllData();

// Auto-refresh every 60 seconds
setInterval(() => {
  loadAllData();
}, 60000);
</script>
